name: Build iOS .deb Package

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Xcode Command Line Tools
      run: |
        xcode-select --install 2>/dev/null || true
        sudo xcode-select --reset
        xcode-select -p
    
    - name: Cache Theos SDKs
      uses: actions/cache@v4
      with:
        path: ~/.theos/sdks
        key: theos-sdks-${{ runner.os }}
        restore-keys: |
          theos-sdks-
    
    - name: Install Theos (includes jailbreak SDKs)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Installing Theos..."
        /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
        export THEOS=~/theos
        export PATH=$THEOS/bin:$PATH
        echo "THEOS=$THEOS" >> $GITHUB_ENV
        echo "$THEOS/bin" >> $GITHUB_PATH
        echo "Theos installation complete"
    
    - name: Verify Theos SDK and frameworks
      run: |
        export THEOS=~/theos
        export PATH=$THEOS/bin:$PATH
        
        echo "=== Theos Location ===" 
        ls -la $THEOS/bin/ | head -5
        
        echo "=== Searching for SDKs ===" 
        ls -la $THEOS/sdks/ 2>/dev/null | head -10 || echo "SDKs directory check"
        
        echo "=== SDK Details ===" 
        find $THEOS/sdks -name "*.sdk" -type d 2>/dev/null | head -3 || echo "Searching for SDKs"
        
        echo "=== Theos make version ===" 
        make --version | head -1 || echo "Make available"
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@nightly
      with:
        targets: aarch64-apple-ios
    
    - name: Verify Rust setup
      run: |
        rustc --version
        cargo --version
        rustup target list | grep aarch64-apple-ios
    
    - name: Build Rust library for iOS
      run: |
        cd kdeconnectjb
        export IPHONEOS_DEPLOYMENT_TARGET=15.0
        export RING_PREGENERATE_ASM=0
        cargo build -r --target aarch64-apple-ios --verbose
        echo "Rust build complete"
    
    - name: Generate C headers
      run: |
        cd kdeconnectjb
        cargo run -r --bin generate-headers --features headers -- ../target/kdeconnectjb.h
        test -f ../target/kdeconnectjb.h && echo "Headers generated successfully" || exit 1
    
    - name: Build iOS packages with Theos
      run: |
        export THEOS=~/theos
        export PATH=$THEOS/bin:$PATH
        
        # Find and set the iOS SDK path
        export SDKROOT=$(find $THEOS/sdks -name "*.sdk" -type d | head -1)
        if [ -z "$SDKROOT" ]; then
          echo "Warning: No iOS SDK found in $THEOS/sdks"
          echo "Available SDKs:"
          ls -la $THEOS/sdks/ || echo "No sdks directory"
        else
          echo "Using SDK: $SDKROOT"
          export PATH=$SDKROOT/usr/bin:$PATH
        fi
        
        cd ios
        make clean
        make FINALPACKAGE=1 VERBOSE=1
        echo "Build complete"
    
    - name: Verify .deb packages
      run: |
        ls -lh ios/.theos/packages/*.deb || exit 1
        echo "Packages built successfully:"
        find ios/.theos/packages -name "*.deb" -exec ls -lh {} \;
    
    - name: Upload .deb artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ios-debs
        path: ios/.theos/packages/*.deb
        retention-days: 30
    
    - name: Create Release (on tagged push)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: ios/.theos/packages/*.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
