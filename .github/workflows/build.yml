name: Build .deb Package

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    container:
      image: theosdev/theos:latest
      options: --user root
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install additional dependencies
        run: |
          apt-get update
          apt-get install -y curl git build-essential
      
      - name: Set up Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain nightly
          source $HOME/.cargo/env
          rustup target add aarch64-apple-ios
      
      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-
      
      - name: Build .deb package
        run: |
          source $HOME/.cargo/env
          ./make.sh do FINALPACKAGE=1
        working-directory: ios
        env:
          THEOS: /theos
      
      - name: Find and upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: |
            ios/.theos/debs/*.deb
          if-no-files-found: warn
      
      - name: List generated files
        if: always()
        run: |
          echo "=== Contents of .theos directory ==="
          find ios/.theos -type f -name "*.deb" 2>/dev/null || echo "No .deb files found"
          echo ""
          echo "=== Full .theos directory structure ==="
          ls -lR ios/.theos/ 2>/dev/null || echo ".theos directory not found"