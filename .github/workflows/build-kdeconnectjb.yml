name: Build kdeconnectjb packages

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-kdeconnectjb.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "kdeconnect/**"
      - "kdeconnectjb/**"
      - "ios/**"
  pull_request:
    paths:
      - ".github/workflows/build-kdeconnectjb.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "kdeconnect/**"
      - "kdeconnectjb/**"
      - "ios/**"

jobs:
  build-deb:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - scheme: rootless
            theos_src: https://github.com/theos/theos
            artifact_name: kdeconnectjb-rootless-deb
            cache_suffix: rootless
          - scheme: roothide
            theos_src: https://github.com/roothide/theos
            artifact_name: kdeconnectjb-roothide-deb
            cache_suffix: roothide

    env:
      THEOS: ${{ github.workspace }}/theos-${{ matrix.scheme }}
      THEOS_PACKAGE_SCHEME: ${{ matrix.scheme }}
      RUSTUP_TOOLCHAIN: nightly
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore Theos cache
        uses: actions/cache@v4
        with:
          path: ${{ env.THEOS }}
          key: theos-${{ runner.os }}-${{ matrix.cache_suffix }}-v1
          restore-keys: |
            theos-${{ runner.os }}-${{ matrix.cache_suffix }}-

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1
        with:
          theos-dir: ${{ env.THEOS }}
          theos-src: ${{ matrix.theos_src }}

      - name: Setup Rust nightly with iOS target
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-apple-ios

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Build package
        run: |
          cd ios
          ./make.sh clean
          ./make.sh package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=${{ matrix.scheme }}

      - name: Validate produced package
        run: |
          cd ios
          deb_path=$(find . -maxdepth 4 -type f -name "*.deb" | head -n 1)
          if [[ -z "$deb_path" ]]; then
            echo "No .deb package was produced"
            exit 1
          fi
          echo "Produced package: $deb_path"
          if [[ "${{ matrix.scheme }}" == "rootless" ]]; then
            case "$deb_path" in
              *iphoneos-arm64*.deb) ;;
              *)
                echo "Expected rootless architecture package (iphoneos-arm64)"
                exit 1
                ;;
            esac
          fi
          mkdir -p ../dist
          cp "$deb_path" "../dist/${{ matrix.scheme }}-$(basename "$deb_path")"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*.deb
          if-no-files-found: error
